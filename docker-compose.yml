version: '3.7'

services:
    ubuntu:
        container_name: nginx_php81
        build:
            dockerfile: Dockerfile
        stdin_open: true
        tty: true
        volumes:
            - .:/var/www/html
        ports:
            - "8000:8000"   # 외부 8000 포트로 컨테이너 8000 포트가 매핑됨
            - "443:443"
        expose:
            - "8000"
        # networks:
        #     - memorial

    db:
        image: mariadb:latest
        container_name: mariadb
        restart: always
        environment:
            MYSQL_DATABASE: memorial
            MYSQL_USER: memorial
            MYSQL_PASSWORD: memorial
            MYSQL_ROOT_PASSWORD: memorial
        volumes:
            - ./mariadb_data:/var/lib/mysql
        ports:
            - "3306:3306"
        # networks:
        #     - memorial

# networks:
#     memorial
